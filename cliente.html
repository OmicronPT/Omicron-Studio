<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Omicron Studio — Prenota</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#f5f3f0;--surface:#ffffff;--border:#e0ddd8;
      --accent:#E8500A;--accent2:#c4420a;--text:#1a1a1a;--muted:#6b6b6b;
      --r:12px;--serif:'Cormorant Garamond',Georgia,serif;--mono:'DM Mono',monospace
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:15px;font-weight:300;min-height:100vh}

    /* ── HEADER FISSO ── */
    .top-bar{
      position:sticky;top:0;z-index:50;
      background:var(--surface);border-bottom:1px solid var(--border);
      box-shadow:0 2px 8px rgba(0,0,0,.06);
    }
    .top-bar-inner{max-width:680px;margin:0 auto;padding:14px 20px;}
    .logo-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .logo{font-family:var(--serif);font-size:22px;font-weight:300;letter-spacing:.1em;color:var(--accent)}
    .logo b{font-weight:600}
    .cliente-pill{display:flex;align-items:center;gap:8px}
    .av-sm{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:13px;color:#fff;flex-shrink:0}
    .cliente-info{font-size:13px}
    .cliente-nome{color:var(--text);font-weight:400}
    .cliente-lezioni{color:var(--muted);font-size:11px;margin-top:1px}
    .cliente-lezioni.warn{color:var(--accent2)}

    /* ── REGOLE COMPATTE ── */
    .regole-bar{
      display:flex;gap:6px;flex-wrap:wrap;padding-top:10px;
      border-top:1px solid var(--border);
    }
    .regola-pill{
      display:inline-flex;align-items:center;gap:4px;
      padding:3px 10px;border-radius:20px;font-size:11px;
      background:rgba(232,80,10,.07);border:1px solid rgba(232,80,10,.2);
      color:var(--text);
    }

    /* ── CONTENT ── */
    .wrap{max-width:680px;margin:0 auto;padding:24px 20px 80px}

    /* ── PRENOTAZIONI ATTIVE ── */
    .section-title{font-family:var(--serif);font-size:19px;font-weight:300;margin-bottom:12px;color:var(--text)}
    .pre-list{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
    .pre-item{
      background:var(--surface);border:1px solid rgba(232,80,10,.25);
      border-radius:10px;padding:12px 16px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
    }
    .pre-data{font-family:var(--serif);font-size:16px;text-transform:capitalize;color:var(--text)}
    .pre-ora{font-size:12px;color:var(--muted);margin-top:2px}
    .divider{height:1px;background:var(--border);margin:24px 0}

    /* ── CALENDARIO ── */
    .cal-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .cal-title{font-family:var(--serif);font-size:22px;font-weight:300;flex:1}
    .cal-nav{display:flex;gap:6px}
    .cal-nav-btn{
      width:34px;height:34px;border-radius:8px;border:1px solid var(--border);
      background:var(--surface);color:var(--text);cursor:pointer;
      font-size:14px;display:flex;align-items:center;justify-content:center;
      transition:all .15s;
    }
    .cal-nav-btn:hover{border-color:var(--accent);color:var(--accent)}

    .cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
    .cal-day-label{text-align:center;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:4px 0}

    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:24px}
    .cal-cell{
      aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;
      align-items:center;justify-content:center;cursor:pointer;
      font-size:14px;position:relative;transition:all .15s;
      border:1px solid transparent;background:transparent;
    }
    .cal-cell.other-month{opacity:.25;pointer-events:none}
    .cal-cell.weekend{opacity:.35;pointer-events:none;color:var(--muted)}
    .cal-cell.passato{opacity:.3;pointer-events:none}
    .cal-cell.disponibile{background:var(--surface);border-color:var(--border);color:var(--text)}
    .cal-cell.disponibile:hover{border-color:var(--accent);background:#fff8f5}
    .cal-cell.selezionato{background:var(--accent);border-color:var(--accent);color:#fff}
    .cal-cell.oggi{font-weight:400;border-color:var(--accent2);}
    .cal-cell.oggi:not(.selezionato){color:var(--accent2)}
    .cal-cell.pieno{background:var(--surface);border-color:var(--border);opacity:.5;pointer-events:none}
    .cal-cell.bloccato{opacity:.25;pointer-events:none}
    .cal-dot{
      width:5px;height:5px;border-radius:50%;
      background:var(--accent);position:absolute;bottom:4px;
    }
    .cal-cell.selezionato .cal-dot{background:#fff}
    .cal-cell.pieno .cal-dot{background:var(--muted)}

    /* ── SLOT DEL GIORNO ── */
    .slot-panel{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--r);padding:20px;
      animation:fadeIn .2s ease;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .slot-panel-title{font-family:var(--serif);font-size:18px;text-transform:capitalize;margin-bottom:16px;color:var(--text)}
    .slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
    .slot{
      background:var(--bg);border:1px solid var(--border);border-radius:10px;
      padding:12px 10px;cursor:pointer;transition:all .18s;text-align:center;
    }
    .slot:hover{border-color:var(--accent);background:#fff8f5}
    .slot.prenotato{border-color:rgba(232,80,10,.4);background:rgba(232,80,10,.06);cursor:default}
    .slot-ora{font-family:var(--serif);font-size:20px;font-weight:300;color:var(--text);margin-bottom:2px}
    .slot-fine{font-size:11px;color:var(--muted);margin-bottom:6px}
    .slot-posti{font-size:11px;color:var(--muted)}
    .slot-posti.scarsi{color:var(--accent2);font-weight:400}
    .slot-badge{font-size:11px;color:#18a34a;margin-top:2px}
    .slot-vuoto{text-align:center;padding:24px;color:var(--muted);font-size:13px}

    /* ── BOTTONI ── */
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 16px;border-radius:8px;font-family:var(--mono);font-size:13px;cursor:pointer;border:none;transition:all .18s;white-space:nowrap}
    .btn-p{background:var(--accent);color:#fff}
    .btn-p:hover{background:var(--accent2)}
    .btn-d{background:transparent;border:1px solid rgba(220,38,38,.4);color:#dc2626}
    .btn-d:hover{background:rgba(220,38,38,.08)}
    .btn-sm{padding:5px 12px;font-size:12px}

    /* ── TOAST ── */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--text);border-radius:10px;padding:12px 22px;font-size:14px;color:var(--surface);opacity:0;transition:all .3s;pointer-events:none;z-index:999;max-width:320px;text-align:center}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #toast.ok{background:#18a34a}
    #toast.err{background:#dc2626}

    /* ── MODAL ── */
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
    .ov.open{opacity:1;pointer-events:all}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:340px;width:90%;transform:translateY(16px);transition:transform .2s;box-shadow:0 20px 60px rgba(0,0,0,.12)}
    .ov.open .modal{transform:none}
    .modal h3{font-family:var(--serif);font-size:22px;margin-bottom:8px}
    .modal p{color:var(--muted);font-size:14px;margin-bottom:22px;line-height:1.6}
    .ma{display:flex;gap:9px;justify-content:flex-end}

    /* ── SPIN ── */
    .spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;margin:30px auto}
    @keyframes sp{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:32px;color:var(--muted)}

    .slot.attesa{border-color:rgba(217,119,6,.4);background:rgba(217,119,6,.05);cursor:pointer}
    .slot.attesa:hover{border-color:rgba(217,119,6,.7);background:rgba(217,119,6,.1)}
    .slot-attesa-badge{font-size:11px;color:#b45309;margin-top:2px}

    /* Lista attesa attiva */
    .attesa-list{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
    .attesa-item{background:rgba(217,119,6,.06);border:1px solid rgba(217,119,6,.25);border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .attesa-data{font-family:var(--serif);font-size:16px;text-transform:capitalize}
    .attesa-ora{font-size:12px;color:var(--muted);margin-top:2px}

    @media(max-width:480px){
      .regole-bar{gap:4px}
      .slot-grid{grid-template-columns:repeat(3,1fr)}
    }
  </style>
</head>
<body>

<!-- ── HEADER FISSO ── -->
<div class="top-bar">
  <div class="top-bar-inner">
    <div class="logo-row">
      <div class="logo"><b>OMICRON</b> STUDIO</div>
      <div class="cliente-pill" id="cliente-pill">
        <div class="av-sm" id="av-sm">…</div>
        <div class="cliente-info">
          <div class="cliente-nome" id="cliente-nome">Caricamento…</div>
          <div class="cliente-lezioni" id="cliente-lezioni"></div>
        </div>
      </div>
    </div>
    <div class="regole-bar">
      <span class="regola-pill">📅 Lun–Ven · 8:30–19:00</span>
      <span class="regola-pill">👥 Max 3 per slot</span>
      <span class="regola-pill">⏱️ Cancella entro 24h</span>
      <span class="regola-pill">🔄 Assenza &gt;24h = recuperabile</span>
      <span class="regola-pill">❌ &lt;24h = lezione persa</span>
    </div>
  </div>
</div>

<!-- ── CONTENT ── -->
<div class="wrap">

  <!-- Prenotazioni attive -->
  <!-- Lista attesa attiva -->
  <div id="sec-attesa" style="display:none">
    <div class="section-title" style="color:#b45309">⏳ In lista d'attesa</div>
    <div id="lista-attesa" class="attesa-list"></div>
    <div class="divider"></div>
  </div>

  <div id="sec-pre" style="display:none">
    <div class="section-title">Le mie prenotazioni</div>
    <div id="lista-pre" class="pre-list"></div>
    <div class="divider"></div>
  </div>

  <!-- Calendario -->
  <div class="cal-header">
    <div class="cal-title" id="cal-title"></div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calMese(-1)">←</button>
      <button class="cal-nav-btn" onclick="calMese(1)">→</button>
    </div>
  </div>
  <div class="cal-days-header" id="cal-days-header"></div>
  <div class="cal-grid" id="cal-grid"><div class="spin"></div></div>

  <!-- Slot del giorno selezionato -->
  <div id="slot-panel" style="display:none"></div>

</div>

<!-- MODAL CONFERMA PRENOTAZIONE -->
<div class="ov" id="ov">
  <div class="modal">
    <h3>Conferma prenotazione</h3>
    <p id="modal-txt"></p>
    <div class="ma">
      <button class="btn btn-sm" style="border:1px solid var(--border)" onclick="chiudiModal('ov')">Annulla</button>
      <button class="btn btn-p btn-sm" id="btn-ok-prenota">Conferma</button>
    </div>
  </div>
</div>

<!-- MODAL CANCELLA -->
<div class="ov" id="ov-canc">
  <div class="modal">
    <h3>Cancella prenotazione</h3>
    <p id="modal-canc-txt">Sei sicuro? La lezione verrà riaccreditata al tuo pacchetto.</p>
    <div class="ma">
      <button class="btn btn-sm" style="border:1px solid var(--border)" onclick="chiudiModal('ov-canc')">Annulla</button>
      <button class="btn btn-d btn-sm" id="btn-ok-canc">Cancella</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbxQUYsOIOZei8WemX1pdmQAm9mdsfWt2P8Cjdhrtxtqlu22I5ACWAiNPVFecVGkq8uwPg/exec";
const TOKEN = new URLSearchParams(window.location.search).get("t") || "";

let cliente=null, slotsData=[], prenotazioni=[], listaAttesa=[];
let calAnno=new Date().getFullYear(), calMeseN=new Date().getMonth();
let giornoSelezionato=null;

// ── JSONP ──────────────────────────────────────────────────
function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb="_cb_"+Date.now()+"_"+Math.floor(Math.random()*9999);
    const script=document.createElement("script");
    const timer=setTimeout(()=>{cleanup();reject(new Error("Timeout"));},10000);
    window[cb]=(data)=>{cleanup();resolve(data);};
    function cleanup(){clearTimeout(timer);delete window[cb];if(script.parentNode)script.parentNode.removeChild(script);}
    script.onerror=()=>{cleanup();reject(new Error("Errore di rete"));};
    script.src=url+(url.includes("?")?"&":"?")+"callback="+cb;
    document.head.appendChild(script);
  });
}
function get(action){return jsonp(BACKEND_URL+"?action="+action+"&token="+encodeURIComponent(TOKEN));}
async function post(body){
  try{const res=await fetch(BACKEND_URL,{method:"POST",body:JSON.stringify({...body,token:TOKEN})});return await res.json();}
  catch(e){return{error:e.message};}
}

// ── INIT ───────────────────────────────────────────────────
async function init(){
  if(!TOKEN){showError("🔒","Link non valido. Contatta lo studio.");return;}
  if(BACKEND_URL==="INSERISCI_QUI_URL_APPS_SCRIPT"){showError("⚙️","Backend non configurato.");return;}
  try{
    const [c,s,p,a]=await Promise.all([get("getCliente"),get("getSlotDisponibili"),get("getPrenotazioni"),get("getListaAttesa")]);
    if(c.error)throw new Error(c.error);
    cliente=c; slotsData=Array.isArray(s)?s:[]; prenotazioni=Array.isArray(p)?p:[]; listaAttesa=Array.isArray(a)?a:[];
    renderClientePill();
    renderListaAttesa();
    renderPrenotazioni();
    renderCal();
  }catch(e){showError("⚠️",e.message);}
}

function showError(ic,msg){
  document.getElementById("cal-grid").innerHTML=`<div class="empty" style="grid-column:1/-1">${ic}<br>${msg}</div>`;
}

// ── HEADER CLIENTE ─────────────────────────────────────────
function renderClientePill(){
  const ini=(cliente.nome[0]+cliente.cognome[0]).toUpperCase();
  const warn=cliente.lezioniRim<=2;
  const scad=new Date(cliente.dataScad), gg=Math.ceil((scad-new Date())/864e5);
  document.getElementById("av-sm").textContent=ini;
  document.getElementById("cliente-nome").textContent=cliente.nome+" "+cliente.cognome;
  const lezEl=document.getElementById("cliente-lezioni");
  lezEl.textContent=`${cliente.lezioniRim} lezioni · scade ${fmtData(cliente.dataScad)}`;
  lezEl.className="cliente-lezioni"+(warn||gg<=7?" warn":"");
}

// ── LISTA ATTESA ───────────────────────────────────────────
function renderListaAttesa(){
  const sec=document.getElementById("sec-attesa"), lista=document.getElementById("lista-attesa");
  if(!listaAttesa.length){sec.style.display="none";return;}
  sec.style.display="block";
  lista.innerHTML=listaAttesa.map(a=>`<div class="attesa-item">
    <div>
      <div class="attesa-data">${fmtDataLabel(a.data)}</div>
      <div class="attesa-ora">🕐 ${a.oraInizio}</div>
    </div>
    <button class="btn btn-sm" style="border:1px solid rgba(217,119,6,.4);color:#b45309" onclick="cancellaAttesa('${a.id}')">Esci dalla lista</button>
  </div>`).join("");
}

function fmtDataLabel(dateStr){
  const d=new Date(dateStr+"T12:00:00");
  return d.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"});
}

// ── PRENOTAZIONI ───────────────────────────────────────────
function renderPrenotazioni(){
  const sec=document.getElementById("sec-pre"), lista=document.getElementById("lista-pre");
  if(!prenotazioni.length){sec.style.display="none";return;}
  sec.style.display="block";
  lista.innerHTML=prenotazioni.map(p=>`<div class="pre-item">
    <div>
      <div class="pre-data">${p.dataLabel}</div>
      <div class="pre-ora">🕐 ${p.oraInizio} – ${p.oraFine}</div>
    </div>
    <button class="btn btn-d btn-sm" onclick="apriModalCanc('${p.id}','${p.dataLabel}','${p.oraInizio}')">Cancella</button>
  </div>`).join("");
}

// ── FESTIVITÀ ─────────────────────────────────────────────
function _pasquaJS(anno){
  const a=anno%19,b=Math.floor(anno/100),c=anno%100,d=Math.floor(b/4),e=b%4;
  const f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451);
  const mese=Math.floor((h+l-7*m+114)/31),giorno=((h+l-7*m+114)%31)+1;
  return new Date(anno,mese-1,giorno);
}
function _festivitaJS(anno){
  const fisse=new Set(["01-01","01-06","04-25","05-01","06-02","08-15","11-01","12-08","12-25","12-26","09-19"]);
  const p=_pasquaJS(anno),pm=new Date(p);pm.setDate(pm.getDate()+1);
  const fmt=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  const mobili=new Set([fmt(p),fmt(pm)]);
  return{fisse,mobili};
}
function _isFestivoJS(dateStr){
  const d=new Date(dateStr+"T12:00:00"),anno=d.getFullYear();
  const{fisse,mobili}=_festivitaJS(anno);
  return fisse.has(dateStr.substring(5))||mobili.has(dateStr);
}

// ── CALENDARIO ─────────────────────────────────────────────────
function calMese(delta){
  calMeseN+=delta;
  if(calMeseN>11){calMeseN=0;calAnno++;}
  if(calMeseN<0){calMeseN=11;calAnno--;}
  giornoSelezionato=null;
  document.getElementById("slot-panel").style.display="none";
  renderCal();
}

function renderCal(){
  const mesi=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
  document.getElementById("cal-title").textContent=mesi[calMeseN]+" "+calAnno;

  // Headers giorni
  document.getElementById("cal-days-header").innerHTML=
    ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"].map(g=>`<div class="cal-day-label">${g}</div>`).join("");

  const primo=new Date(calAnno,calMeseN,1);
  const ultimo=new Date(calAnno,calMeseN+1,0);
  const startDow=(primo.getDay()+6)%7;
  const oggi=new Date(); oggi.setHours(0,0,0,0);

  // Mappa slot per data
  const slotMap={};
  slotsData.forEach(g=>slotMap[g.data]=g);

  let cells="";

  // Celle prima del mese
  for(let i=0;i<startDow;i++){
    const d=new Date(calAnno,calMeseN,1-startDow+i);
    cells+=`<div class="cal-cell other-month">${d.getDate()}</div>`;
  }

  // Giorni del mese
  for(let d=1;d<=ultimo.getDate();d++){
    const date=new Date(calAnno,calMeseN,d);
    const dateStr=date.getFullYear()+"-"+String(date.getMonth()+1).padStart(2,"0")+"-"+String(date.getDate()).padStart(2,"0");
    const dow=date.getDay();
    const isWeekend=dow===0||dow===6;
    const isFestivo=!isWeekend&&_isFestivoJS(dateStr);
    const isOggi=date.getTime()===oggi.getTime();
    const isPast=date<oggi;
    const info=slotMap[dateStr];
    const isSel=giornoSelezionato===dateStr;

    let cls="cal-cell";
    let dot="";

    if(isWeekend||isFestivo) cls+=" weekend";
    else if(isPast) cls+=" passato";
    else if(!info) cls+=" bloccato";
    else {
      const liberi=info.slots.filter(s=>!s.prenotato&&s.postiLiberi>0);
      if(liberi.length===0) cls+=" pieno";
      else cls+=" disponibile";
      dot=`<div class="cal-dot"></div>`;
    }

    if(isOggi) cls+=" oggi";
    if(isSel) cls+=" selezionato";

    const click=(!isWeekend&&!isPast&&info)? `onclick="selezionaGiorno('${dateStr}')"` : "";
    cells+=`<div class="${cls}" ${click}>${d}${dot}</div>`;
  }

  // Celle dopo
  const rimaste=(7-(startDow+ultimo.getDate())%7)%7;
  for(let i=1;i<=rimaste;i++){
    cells+=`<div class="cal-cell other-month">${i}</div>`;
  }

  document.getElementById("cal-grid").innerHTML=cells;
}

// ── SLOT DEL GIORNO ────────────────────────────────────────
function selezionaGiorno(dateStr){
  giornoSelezionato=dateStr;
  renderCal();

  const info=slotsData.find(g=>g.data===dateStr);
  const panel=document.getElementById("slot-panel");
  panel.style.display="block";

  if(!info||!info.slots.length){
    panel.innerHTML=`<div class="slot-panel"><div class="slot-panel-title">${dateStr}</div><div class="slot-vuoto">Nessuno slot disponibile per questo giorno.</div></div>`;
    panel.scrollIntoView({behavior:"smooth",block:"nearest"});
    return;
  }

  const preSet=new Set(prenotazioni.map(p=>p.data+"_"+p.oraInizio));

  panel.innerHTML=`<div class="slot-panel">
    <div class="slot-panel-title">${info.dataLabel}</div>
    <div class="slot-grid">
      ${info.slots.map(s=>{
        const prenotato=s.prenotato||preSet.has(dateStr+"_"+s.ora);
        const inAttesaSet=new Set(listaAttesa.map(a=>a.data+"_"+a.oraInizio));
        const inAttesa=inAttesaSet.has(dateStr+"_"+s.ora);
        const pieno=s.postiLiberi===0&&!prenotato;
        const scarsi=s.postiLiberi===1;

        if(pieno&&!prenotato){
          // Slot pieno - mostra pulsante lista attesa
          return`<div class="slot ${inAttesa?'attesa':''}" ${inAttesa?'':`onclick="apriModalAttesa('${dateStr}','${s.ora}','${s.oraFine}','${info.dataLabel}')"`}>
            <div class="slot-ora">${s.ora}</div>
            <div class="slot-fine">fino alle ${s.oraFine}</div>
            <div class="slot-posti" style="color:#dc2626">al completo</div>
            ${inAttesa?'<div class="slot-attesa-badge">⏳ In lista</div>':'<div class="slot-attesa-badge">+ Lista attesa</div>'}
          </div>`;
        }

        return`<div class="slot ${prenotato?'prenotato':''}" ${prenotato?'':` onclick="apriModalPrenota('${dateStr}','${s.ora}','${s.oraFine}','${info.dataLabel}')"`}>
          <div class="slot-ora">${s.ora}</div>
          <div class="slot-fine">fino alle ${s.oraFine}</div>
          ${prenotato
            ?'<div class="slot-badge">✓ Prenotata</div>'
            :`<div class="slot-posti ${scarsi?'scarsi':''}">${s.postiLiberi} ${s.postiLiberi===1?'posto':'posti'}</div>`
          }
        </div>`;
      }).join("")}
    </div>
  </div>`;

  panel.scrollIntoView({behavior:"smooth",block:"nearest"});
}

// ── AZIONI ─────────────────────────────────────────────────
function apriModalPrenota(data,ora,oraFine,dataLabel){
  document.getElementById("modal-txt").textContent=`${dataLabel} — dalle ${ora} alle ${oraFine}`;
  document.getElementById("btn-ok-prenota").onclick=()=>prenota(data,ora);
  apriModal("ov");
}

async function prenota(data,ora){
  chiudiModal("ov");
  const res=await post({action:"prenota",data,oraInizio:ora});
  if(res.error){toast(res.error,"err");return;}
  toast("Prenotazione confermata! 🎉","ok");
  cliente.lezioniRim=res.lezioniRimanenti;
  const[s,p,a]=await Promise.all([get("getSlotDisponibili"),get("getPrenotazioni"),get("getListaAttesa")]);
  slotsData=Array.isArray(s)?s:[]; prenotazioni=Array.isArray(p)?p:[]; listaAttesa=Array.isArray(a)?a:[];
  renderClientePill(); renderListaAttesa(); renderPrenotazioni(); renderCal();
  if(giornoSelezionato) selezionaGiorno(giornoSelezionato);
}

function apriModalCanc(id,dataLabel,ora){
  document.getElementById("modal-canc-txt").textContent=`Cancelli il ${dataLabel} alle ${ora}? La lezione verrà riaccreditata.`;
  document.getElementById("btn-ok-canc").onclick=()=>cancella(id);
  apriModal("ov-canc");
}

function apriModalAttesa(data,ora,oraFine,dataLabel){
  document.getElementById("modal-txt").textContent=`Vuoi entrare in lista d'attesa per ${dataLabel} alle ${ora}? Ti avviseremo subito se si libera un posto.`;
  document.getElementById("btn-ok-prenota").textContent="Entra in lista";
  document.getElementById("btn-ok-prenota").onclick=()=>iscriviAttesa(data,ora);
  apriModal("ov");
}

async function iscriviAttesa(data,oraInizio){
  chiudiModal("ov");
  document.getElementById("btn-ok-prenota").textContent="Conferma";
  const res=await post({action:"iscriviListaAttesa",data,oraInizio});
  if(res.error){toast(res.error,"err");return;}
  toast(`Sei in lista d'attesa! Posizione: ${res.posizione}`,"ok");
  const[s,p,a]=await Promise.all([get("getSlotDisponibili"),get("getPrenotazioni"),get("getListaAttesa")]);
  slotsData=Array.isArray(s)?s:[]; prenotazioni=Array.isArray(p)?p:[]; listaAttesa=Array.isArray(a)?a:[];
  renderClientePill(); renderListaAttesa(); renderPrenotazioni(); renderCal();
  if(giornoSelezionato) selezionaGiorno(giornoSelezionato);
}

async function cancellaAttesa(id){
  const res=await post({action:"cancellaListaAttesa",id});
  if(res.error){toast(res.error,"err");return;}
  toast("Rimosso dalla lista d'attesa","ok");
  const[s,p,a]=await Promise.all([get("getSlotDisponibili"),get("getPrenotazioni"),get("getListaAttesa")]);
  slotsData=Array.isArray(s)?s:[]; prenotazioni=Array.isArray(p)?p:[]; listaAttesa=Array.isArray(a)?a:[];
  renderClientePill(); renderListaAttesa(); renderPrenotazioni(); renderCal();
  if(giornoSelezionato) selezionaGiorno(giornoSelezionato);
}

async function cancella(id){
  chiudiModal("ov-canc");
  const res=await post({action:"cancella",idPrenotazione:id});
  if(res.error){toast(res.error,"err");return;}
  toast("Prenotazione cancellata. Lezione riaccreditata.","ok");
  cliente.lezioniRim=res.lezioniRimanenti;
  const[s,p]=await Promise.all([get("getSlotDisponibili"),get("getPrenotazioni")]);
  slotsData=Array.isArray(s)?s:[]; prenotazioni=Array.isArray(p)?p:[];
  renderClientePill(); renderPrenotazioni(); renderCal();
  if(giornoSelezionato) selezionaGiorno(giornoSelezionato);
}

// ── UTILS ──────────────────────────────────────────────────
function fmtData(str){return new Date(str).toLocaleDateString("it-IT",{day:"numeric",month:"short"});}
function apriModal(id){document.getElementById(id).classList.add("open");}
function chiudiModal(id){document.getElementById(id).classList.remove("open");}
function toast(msg,tipo){const el=document.getElementById("toast");el.textContent=msg;el.className="show "+(tipo||"");setTimeout(()=>el.className="",3500);}
document.querySelectorAll(".ov").forEach(ov=>ov.addEventListener("click",e=>{if(e.target===ov)ov.classList.remove("open");}));

init();
</script>
</body>
</html>
