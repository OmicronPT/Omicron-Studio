<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Omicron Studio — Prenota</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#f5f3f0;--surface:#ffffff;--border:#e0ddd8;--accent:#E8500A;--accent2:#c4420a;--text:#1a1a1a;--muted:#6b6b6b;--r:12px;--serif:'Cormorant Garamond',Georgia,serif;--mono:'DM Mono',monospace}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:16px;font-weight:300;min-height:100vh;letter-spacing:.02em}
    .wrap{max-width:640px;margin:0 auto;padding:0 20px 80px}

    header{padding:44px 0 32px;border-bottom:1px solid var(--border);margin-bottom:36px}
    .logo{font-family:var(--serif);font-size:30px;font-weight:300;letter-spacing:.12em;color:var(--accent)}
    .logo b{font-weight:600}
    .sub{color:var(--muted);font-size:12px;letter-spacing:.18em;text-transform:uppercase;margin-top:4px}

    /* Card cliente */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px;margin-bottom:32px;display:flex;align-items:center;gap:18px}
    .av{width:50px;height:50px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:20px;color:#fff}
    .cn{font-family:var(--serif);font-size:22px;font-weight:400;line-height:1.2}
    .pills{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
    .pill{padding:3px 10px;border-radius:20px;font-size:13px;display:inline-flex;align-items:center;gap:4px}
    .pill-g{background:rgba(232,80,10,.1);border:1px solid rgba(232,80,10,.3);color:var(--accent2)}
    .pill-m{background:rgba(107,107,107,.08);border:1px solid var(--border);color:var(--muted)}
    .pill-w{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.3);color:#dc2626}

    /* Prenotazioni attive */
    .pre-list{display:flex;flex-direction:column;gap:8px}
    .pre-item{background:rgba(232,80,10,.04);border:1px solid rgba(232,80,10,.2);border-radius:8px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .pre-data{font-family:var(--serif);font-size:17px;text-transform:capitalize}
    .pre-ora{font-size:13px;color:var(--muted);margin-top:2px}

    /* Sezione */
    .sh{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
    .st{font-family:var(--serif);font-size:20px;font-weight:300;letter-spacing:.06em}
    .sc{font-size:12px;color:var(--muted);letter-spacing:.1em}
    .divider{height:1px;background:var(--border);margin:36px 0}

    /* Giorni */
    .giorno-block{margin-bottom:28px}
    .giorno-title{font-family:var(--serif);font-size:19px;font-weight:300;text-transform:capitalize;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

    /* Slot grid */
    .slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
    .slot{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;text-align:center}
    .slot:hover{border-color:var(--accent2);background:#16161b}
    .slot.prenotato{border-color:rgba(232,80,10,.4);background:rgba(232,80,10,.05);cursor:default}
    .slot-ora{font-family:var(--serif);font-size:22px;font-weight:300;color:var(--text);margin-bottom:4px}
    .slot-fine{font-size:12px;color:var(--muted);margin-bottom:8px}
    .slot-posti{font-size:12px;color:var(--muted)}
    .slot-posti.scarsi{color:var(--accent2)}
    .slot-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;margin-top:4px}
    .slot-badge-ok{background:rgba(232,80,10,.08);border:1px solid rgba(232,80,10,.3);color:var(--accent2)}
    .slot-badge-pre{background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);color:#18a34a}

    /* Bottoni */
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 16px;border-radius:8px;font-family:var(--mono);font-size:13px;font-weight:400;letter-spacing:.07em;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
    .btn-p{background:var(--accent);color:var(--bg)}
    .btn-p:hover{background:var(--accent2)}
    .btn-p:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
    .btn-d{background:transparent;border:1px solid rgba(192,57,43,.4);color:#e74c3c}
    .btn-d:hover{background:rgba(192,57,43,.1)}
    .btn-sm{padding:6px 13px;font-size:12px}

    /* Toast */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);border:1px solid var(--text);border-radius:10px;padding:13px 22px;font-size:14px;color:var(--surface);opacity:0;transition:all .3s;pointer-events:none;z-index:999;max-width:320px;text-align:center}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #toast.ok{background:#18a34a;border-color:#18a34a;color:#fff}
    #toast.err{background:#dc2626;border-color:#dc2626;color:#fff}

    /* Modal */
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
    .ov.open{opacity:1;pointer-events:all}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:340px;width:90%;transform:translateY(16px);transition:transform .2s}
    .ov.open .modal{transform:none}
    .modal h3{font-family:var(--serif);font-size:22px;margin-bottom:8px}
    .modal p{color:var(--muted);font-size:14px;margin-bottom:22px;line-height:1.6}
    .ma{display:flex;gap:9px;justify-content:flex-end}

    .spin{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;margin:50px auto}
    @keyframes sp{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:36px;color:var(--muted)}

    @media(max-width:480px){
      .card{flex-direction:column;align-items:flex-start}
      .slot-grid{grid-template-columns:repeat(3,1fr)}
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><b>OMICRON</b> STUDIO</div>
    <div class="sub">Personal Training · Napoli</div>
  </header>

  <div id="card-cliente"></div>

  <div id="sec-pre" style="display:none">
    <div class="sh"><div class="st">Le mie prenotazioni</div></div>
    <div id="lista-pre" class="pre-list"></div>
    <div class="divider"></div>
  </div>

  <div class="sh">
    <div class="st">Prenota una sessione</div>
    <div class="sc" id="cnt"></div>
  </div>
  <div id="lista-slot"><div class="spin"></div></div>
</div>

<div id="toast"></div>

<div class="ov" id="ov">
  <div class="modal">
    <h3>Conferma prenotazione</h3>
    <p id="modal-txt"></p>
    <div class="ma">
      <button class="btn btn-sm" style="border:1px solid var(--border)" onclick="chiudiModal()">Annulla</button>
      <button class="btn btn-p btn-sm" id="btn-ok">Conferma</button>
    </div>
  </div>
</div>

<div class="ov" id="ov-cancella">
  <div class="modal">
    <h3>Cancella prenotazione</h3>
    <p id="modal-canc-txt">Sei sicuro? La lezione verrà riaccreditata.</p>
    <div class="ma">
      <button class="btn btn-sm" style="border:1px solid var(--border)" onclick="chiudiModalCancella()">Annulla</button>
      <button class="btn btn-d btn-sm" id="btn-ok-cancella">Cancella</button>
    </div>
  </div>
</div>

<script>
const BACKEND_URL = "https://script.google.com/macros/s/AKfycby9sWxfytYmOpP3yIxkrODRpsSSaXwyIrFk6NT0z7iEoJigjmdpCFXZybgCXhrSNPIU2w/exec";
const TOKEN = new URLSearchParams(window.location.search).get("t") || "";

let cliente=null, slotsData=[], prenotazioni=[];

// ── JSONP ──────────────────────────────────────────────────
function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb="_cb_"+Date.now()+"_"+Math.floor(Math.random()*9999);
    const script=document.createElement("script");
    const timer=setTimeout(()=>{cleanup();reject(new Error("Timeout — controlla il backend"));},10000);
    window[cb]=(data)=>{cleanup();resolve(data);};
    function cleanup(){clearTimeout(timer);delete window[cb];if(script.parentNode)script.parentNode.removeChild(script);}
    script.onerror=()=>{cleanup();reject(new Error("Errore di rete"));};
    script.src=url+(url.includes("?")?"&":"?")+"callback="+cb;
    document.head.appendChild(script);
  });
}
function get(action){return jsonp(BACKEND_URL+"?action="+action+"&token="+encodeURIComponent(TOKEN));}
async function post(body){
  try{const res=await fetch(BACKEND_URL,{method:"POST",body:JSON.stringify({...body,token:TOKEN})});return await res.json();}
  catch(e){return{error:e.message};}
}

// ── INIT ──────────────────────────────────────────────────
async function init(){
  if(!TOKEN){showError("🔒","Link non valido. Contatta lo studio.");return;}
  if(BACKEND_URL==="INSERISCI_QUI_URL_APPS_SCRIPT"){showError("⚙️","Backend non configurato.");return;}
  try{
    const [c,s,p]=await Promise.all([get("getCliente"),get("getSlotDisponibili"),get("getPrenotazioni")]);
    if(c.error)throw new Error(c.error);
    cliente=c;slotsData=Array.isArray(s)?s:[];prenotazioni=Array.isArray(p)?p:[];
    renderCliente();renderPrenotazioni();renderSlot();
  }catch(e){showError("⚠️",e.message);}
}

function showError(ic,msg){
  document.getElementById("card-cliente").innerHTML=`<div class="empty">${ic}<br>${msg}</div>`;
  document.getElementById("lista-slot").innerHTML="";
}

// ── RENDER CLIENTE ─────────────────────────────────────────
function renderCliente(){
  const ini=(cliente.nome[0]+cliente.cognome[0]).toUpperCase();
  const scad=new Date(cliente.dataScad),gg=Math.ceil((scad-new Date())/864e5);
  const warn=cliente.lezioniRim<=2,warnS=gg<=7;
  document.getElementById("card-cliente").innerHTML=`<div class="card">
    <div class="av">${ini}</div>
    <div>
      <div class="cn">${cliente.nome} ${cliente.cognome}</div>
      <div class="pills">
        <span class="pill ${warn?'pill-w':'pill-g'}">💪 ${cliente.lezioniRim} lezioni rimanenti</span>
        <span class="pill ${warnS?'pill-w':'pill-m'}">📅 scade ${fmtData(cliente.dataScad)}</span>
      </div>
    </div></div>`;
}

// ── RENDER PRENOTAZIONI ────────────────────────────────────
function renderPrenotazioni(){
  const sec=document.getElementById("sec-pre"),lista=document.getElementById("lista-pre");
  if(!prenotazioni.length){sec.style.display="none";return;}
  sec.style.display="block";
  lista.innerHTML=prenotazioni.map(p=>`<div class="pre-item">
    <div>
      <div class="pre-data">${p.dataLabel}</div>
      <div class="pre-ora">🕐 ${p.oraInizio} – ${p.oraFine}</div>
    </div>
    <button class="btn btn-d btn-sm" onclick="apriModalCancella('${p.id}','${p.dataLabel}','${p.oraInizio}')">Cancella</button>
  </div>`).join("");
}

// ── RENDER SLOT ────────────────────────────────────────────
function renderSlot(){
  const lista=document.getElementById("lista-slot");
  if(!slotsData.length){lista.innerHTML='<div class="empty">Nessuno slot disponibile al momento.</div>';return;}

  const totSlot=slotsData.reduce((a,g)=>a+g.slots.length,0);
  document.getElementById("cnt").textContent=totSlot+" slot disponibili";

  lista.innerHTML=slotsData.map(g=>`
    <div class="giorno-block">
      <div class="giorno-title">${g.dataLabel}</div>
      <div class="slot-grid">
        ${g.slots.map(s=>{
          const scarsi=s.postiLiberi<=1;
          return`<div class="slot ${s.prenotato?'prenotato':''}" onclick="${s.prenotato?'':` apriModalPrenota('${g.data}','${s.ora}','${s.oraFine}','${g.dataLabel}')`}">
            <div class="slot-ora">${s.ora}</div>
            <div class="slot-fine">fino alle ${s.oraFine}</div>
            ${s.prenotato
              ?'<div class="slot-badge slot-badge-pre">✓ Prenotata</div>'
              :`<div class="slot-posti ${scarsi?'scarsi':''}">${s.postiLiberi} ${s.postiLiberi===1?'posto':'posti'} liberi</div>`
            }
          </div>`;
        }).join("")}
      </div>
    </div>`).join("");
}

// ── AZIONI ─────────────────────────────────────────────────
let _pendData="",_pendOra="";

function apriModalPrenota(data,ora,oraFine,dataLabel){
  _pendData=data;_pendOra=ora;
  document.getElementById("modal-txt").textContent=`${dataLabel} dalle ${ora} alle ${oraFine}`;
  document.getElementById("btn-ok").onclick=()=>prenota(data,ora);
  document.getElementById("ov").classList.add("open");
}
function chiudiModal(){document.getElementById("ov").classList.remove("open");}

async function prenota(data,ora){
  chiudiModal();
  const res=await post({action:"prenota",data,oraInizio:ora});
  if(res.error){toast(res.error,"err");return;}
  toast("Prenotazione confermata! 🎉","ok");
  cliente.lezioniRim=res.lezioniRimanenti;
  const[s,p]=await Promise.all([get("getSlotDisponibili"),get("getPrenotazioni")]);
  slotsData=Array.isArray(s)?s:[];prenotazioni=Array.isArray(p)?p:[];
  renderCliente();renderPrenotazioni();renderSlot();
}

let _idCanc="";
function apriModalCancella(id,dataLabel,ora){
  _idCanc=id;
  document.getElementById("modal-canc-txt").textContent=`Cancelli la prenotazione del ${dataLabel} alle ${ora}? La lezione verrà riaccreditata.`;
  document.getElementById("btn-ok-cancella").onclick=()=>cancella(id);
  document.getElementById("ov-cancella").classList.add("open");
}
function chiudiModalCancella(){document.getElementById("ov-cancella").classList.remove("open");}

async function cancella(id){
  chiudiModalCancella();
  const res=await post({action:"cancella",idPrenotazione:id});
  if(res.error){toast(res.error,"err");return;}
  toast("Prenotazione cancellata. Lezione riaccreditata.","ok");
  cliente.lezioniRim=res.lezioniRimanenti;
  const[s,p]=await Promise.all([get("getSlotDisponibili"),get("getPrenotazioni")]);
  slotsData=Array.isArray(s)?s:[];prenotazioni=Array.isArray(p)?p:[];
  renderCliente();renderPrenotazioni();renderSlot();
}

// ── UTILS ──────────────────────────────────────────────────
function fmtData(str){return new Date(str).toLocaleDateString("it-IT",{day:"numeric",month:"short",year:"numeric"});}
function toast(msg,tipo){const el=document.getElementById("toast");el.textContent=msg;el.className="show "+(tipo||"");setTimeout(()=>el.className="",3500);}
document.getElementById("ov").addEventListener("click",e=>{if(e.target===document.getElementById("ov"))chiudiModal();});
document.getElementById("ov-cancella").addEventListener("click",e=>{if(e.target===document.getElementById("ov-cancella"))chiudiModalCancella();});

init();
</script>
</body>
</html>
